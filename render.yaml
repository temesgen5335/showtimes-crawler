# Render Blueprint — provisions the crawler web service + a managed Redis.
# Deploy: push this repo, then in the Render dashboard choose
# "New +" → "Blueprint" and point it at this repo. Render reads this file.
services:
  - type: web
    name: showtimes-crawler
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # Render injects PORT; the app already reads it. Set explicitly for clarity.
      - key: PORT
        value: 10000
      # Wire the managed Redis connection string in automatically.
      - key: REDIS_URL
        fromService:
          type: redis
          name: showtimes-crawler-redis
          property: connectionString
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      # Default to the lightweight HTTP engine; the browser engine is available
      # per-request via {"engine":"browser"} but is memory-heavy on the free tier.
      - key: FETCH_ENGINE
        value: http
      - key: FETCH_TIMEOUT_MS
        value: '15000'
      - key: JOB_ATTEMPTS
        value: '2'
      - key: RATE_LIMIT_MAX
        value: '5'
      - key: RATE_LIMIT_DURATION_MS
        value: '1000'
      - key: WORKER_CONCURRENCY
        value: '3'
      - key: BULL_BOARD_ROUTE
        value: /admin/queues
      # Proxy pool — set in the Render dashboard if/when you have one.
      - key: PROXY_URLS
        sync: false

  - type: redis
    name: showtimes-crawler-redis
    plan: free
    # BullMQ requires keys to survive memory pressure — never evict.
    maxmemoryPolicy: noeviction
    # Reachable only from services in this blueprint (no public exposure).
    ipAllowList: []
